<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מדיטציות</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <img src="images/naomi.jpg" alt="נעמי גרשטיין" class="header-photo">
                <div class="header-text">
                    <h1>מדיטציות</h1>
                    <p class="subtitle">בהנחיית נעמי גרשטיין</p>
                </div>
            </div>
        </header>

        <!-- Main page with meditation list -->
        <main id="meditation-list" class="page active">
            <div class="meditations-grid">
                <!-- Meditation cards will be inserted here by JavaScript -->
            </div>
        </main>

        <!-- Player page -->
        <div id="player-page" class="page">
            <button class="back-button" onclick="showMainPage()">
                → חזרה לרשימה
            </button>
            
            <div class="player-container">
                <h2 id="player-title" class="player-title"></h2>
                <p id="player-date" class="player-date"></p>
                
                <audio id="audio-player"></audio>
                
                <div class="progress-container">
                    <span id="current-time" class="time">0:00</span>
                    <div class="seek-bar-wrapper">
                        <div class="seek-bar-track"></div>
                        <div id="speech-segments" class="speech-segments"></div>
                        <input type="range" id="seek-bar" class="seek-bar" value="0" min="0" max="100">
                    </div>
                    <span id="duration" class="time">0:00</span>
                </div>
                
                <div class="controls">
                    <button class="control-button seek-button seek-back" onclick="seekBackward()">
                        <svg class="seek-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                        </svg>
                    </button>
                    <button id="play-pause-button" class="control-button play-button" onclick="togglePlayPause()">
                        <span class="play-icon"></span>
                    </button>
                    <button class="control-button seek-button seek-forward" onclick="seekForward()">
                        <svg class="seek-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                            <path d="M21 3v5h-5"/>
                        </svg>
                    </button>
                </div>
                
                <p id="player-description" class="player-description"></p>
                
                <button class="share-button" onclick="openShareModal()">
                    שיתוף
                </button>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="share-modal" class="modal-overlay" onclick="closeShareModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>שיתוף מדיטציה</h3>
            <div class="share-url-container">
                <input type="text" id="share-url" class="share-url-input" readonly>
                <button class="copy-button" onclick="copyShareUrl()">העתק</button>
            </div>
            <p id="copy-confirmation" class="copy-confirmation"></p>
            <button class="modal-close-button" onclick="closeShareModal()">סגור</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
